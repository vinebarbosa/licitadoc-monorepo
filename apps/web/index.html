<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Plataforma para geração de documentos oficiais exigidos pela Lei 14.133: DFD, ETP, Termo de Referência e Minuta de Contrato. Assistente inteligente para o setor público." />
    <meta name="keywords" content="licitação, lei 14.133, DFD, ETP, termo de referência, contratações públicas, setor público" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f8fafc" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f1419" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <script>
      (() => {
        const storageKey = "licitadoc-theme";
        const root = document.documentElement;

        try {
          const storedTheme = window.localStorage.getItem(storageKey);
          const theme =
            storedTheme === "light" || storedTheme === "dark"
              ? storedTheme
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";

          root.classList.toggle("dark", theme === "dark");
          root.dataset.theme = theme;
          root.style.colorScheme = theme;
        } catch {
          root.classList.remove("dark");
          root.dataset.theme = "light";
          root.style.colorScheme = "light";
        }
      })();
    </script>
    <title>LicitaDoc | Documentos para Contratações Públicas</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
